<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="folder1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196f3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="folder2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd54f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffc107;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- 光晕效果 -->
  <circle cx="200" cy="200" r="180" fill="rgba(255,255,255,0.1)"/>

  <!-- 源文件夹（左上，蓝色） -->
  <g transform="translate(100, 160)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="100" rx="8" fill="url(#folder1Grad)"/>
    <rect x="0" y="0" width="130" height="28" rx="8" fill="#42a5f5"/>
    <rect x="0" y="20" width="130" height="80" rx="8" fill="url(#folder1Grad)"/>
    <!-- 文件装饰 -->
    <rect x="15" y="40" width="35" height="45" rx="3" fill="rgba(255,255,255,0.9)"/>
    <rect x="55" y="40" width="35" height="45" rx="3" fill="rgba(255,255,255,0.7)"/>
    <rect x="95" y="40" width="20" height="45" rx="3" fill="rgba(255,255,255,0.5)"/>
  </g>

  <!-- 目标文件夹（右下，绿色） -->
  <g transform="translate(282, 252)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="100" rx="8" fill="url(#folder2Grad)"/>
    <rect x="0" y="0" width="130" height="28" rx="8" fill="#66bb6a"/>
    <rect x="0" y="20" width="130" height="80" rx="8" fill="url(#folder2Grad)"/>
    <!-- 文件装饰 -->
    <rect x="15" y="40" width="35" height="45" rx="3" fill="rgba(255,255,255,0.9)"/>
    <rect x="55" y="40" width="35" height="45" rx="3" fill="rgba(255,255,255,0.7)"/>
    <rect x="95" y="40" width="20" height="45" rx="3" fill="rgba(255,255,255,0.5)"/>
  </g>

  <!-- 迁移箭头 -->
  <g transform="translate(230, 220)">
    <!-- 箭头主体 -->
    <line x1="0" y1="30" x2="70" y2="30" stroke="url(#arrowGrad)" stroke-width="18" stroke-linecap="round"/>
    <!-- 箭头头部 -->
    <polygon points="70,30 55,15 55,45" fill="url(#arrowGrad)"/>
  </g>

  <!-- 高光 -->
  <ellipse cx="180" cy="140" rx="100" ry="50" fill="rgba(255,255,255,0.08)"/>
</svg>
