name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  release:
    types: [created]

env:
  DOTNET_VERSION: '10.0'
  APP_NAME: file-sync

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build release
        run: dotnet build -c Release

      - name: Run tests
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Publish self-contained
        run: |
          dotnet publish src/file-sync.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o ./publish

      - name: Create zip archive
        run: |
          $version = $env:GITHUB_REF_NAME -replace 'v',''
          Compress-Archive -Path ./publish/* -DestinationPath ./publish/$env:APP_NAME-$version-win-x64.zip -Force

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            publish/${{ env.APP_NAME }}-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
